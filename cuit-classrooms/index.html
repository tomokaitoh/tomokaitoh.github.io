<html>
 <head> 
  <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"> 
  <title>成信大教室信息查询系统</title> 
  <link rel="stylesheet" type="text/css" href="./css/style.css"> 
  <script src="js/jq.js"></script> 
  <meta http-equiv="Access-Control-Allow-Origin" content="*">
 </head> 
 <body id="v1"> 
  <div class="header">
  <h1 class="header">成都信息工程大学<br/><small>教室信息查询</small></h1>
   </div>
   <div>
    <button onclick="getData(1,1,1,1)">按钮</button>
   </div>
   <div id="content"></div>
    <script type="text/javascript">
      function getData(building,week,day,n){
        var url="./data/emptyClassrooms/H"+building+"/week"+week+"/day"+day+"/"+n+".json";
        $.getJSON(url,function(data){
          for(var i=0;i<data.length;i++){
            document.getElementById('content').innerText+=""+data[i];
          }
        });
      }
    </script> 
  </body>
</html>
